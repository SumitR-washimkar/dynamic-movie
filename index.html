<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Movie Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #16DED4 0%, #0C8383 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: block;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1em;
        }

        .qr-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #qrcode {
            margin: 20px 0;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 20px;
        }

        .stat-box {
            flex: 1;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 0.8em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #0C8383;
            font-size: 1.8em;
            font-weight: bold;
        }

        .button {
            background: linear-gradient(135deg, #16DED4 0%, #0C8383 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px 5px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(22, 222, 212, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: #95a5a6;
        }

        .button.secondary:hover {
            box-shadow: 0 10px 20px rgba(149, 165, 166, 0.4);
        }

        .instructions {
            background: #e0f7f6;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            color: #0C8383;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .logo {
                width: 60px;
                height: 60px;
            }

            h1 {
                font-size: 1.5em;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>Dynamic Dumb Charades</h1>

        <div class="qr-container">
            <p style="color: #0C8383; font-weight: bold; margin-bottom: 10px;">Scan this QR Code to get a random movie!</p>
            <div id="qrcode"></div>
        </div>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Remaining</div>
                <div class="stat-value" id="remaining">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Shown</div>
                <div class="stat-value" id="shown">-</div>
            </div>
        </div>

        <button class="button secondary" onclick="resetMovies()">Reset List</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const BASE_URL = 'https://dynamic-movie-429498537564.europe-west1.run.app/'; // 👈 CHANGE THIS
        
        const API_URL = BASE_URL;
        const MOVIE_URL = `${BASE_URL}/movie`;

        // Generate QR code
        new QRCode(document.getElementById("qrcode"), {
            text: MOVIE_URL,
            width: 256,
            height: 256,
            colorDark: "#0C8383",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Load status on page load
        window.addEventListener('DOMContentLoaded', function() {
            loadStatus();
            // Refresh status every 5 seconds
            setInterval(loadStatus, 5000);
        });

        async function loadStatus() {
            try {
                const response = await fetch(`${API_URL}/api/status`);
                const data = await response.json();

                document.getElementById('remaining').textContent = data.remaining;
                document.getElementById('shown').textContent = data.shown;
            } catch (error) {
                console.error('Failed to load status:', error);
            }
        }

        async function resetMovies() {
            if (!confirm('Are you sure you want to reset the movie list?')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/reset`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (response.ok) {
                    alert('Movie list reset successfully!');
                    loadStatus();
                } else {
                    throw new Error(data.message || 'Failed to reset movies');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
