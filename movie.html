<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Random Movie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #16DED4 0%, #0C8383 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: block;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .movie-display {
            background: linear-gradient(135deg, #16DED4 0%, #0C8383 100%);
            border-radius: 15px;
            padding: 40px 30px;
            margin: 30px 0;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .movie-display::before {
            content: '';
            background-image: url('logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 100px;
            height: 100px;
            position: absolute;
            opacity: 0.1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .movie-name {
            color: white;
            font-size: 2em;
            font-weight: bold;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-in;
            line-height: 1.3;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .placeholder {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2em;
        }

        .loading {
            display: none;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #16DED4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #e74c3c;
            margin: 15px 0;
            padding: 15px;
            background: #ffeaea;
            border-radius: 10px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .button {
            background: linear-gradient(135deg, #16DED4 0%, #0C8383 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px 5px;
            text-decoration: none;
            display: inline-block;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(22, 222, 212, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .logo {
                width: 60px;
                height: 60px;
            }

            h1 {
                font-size: 1.5em;
            }

            .movie-name {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>Your Movie is</h1>

        <div class="movie-display">
            <div id="movieName" class="placeholder">Loading your movie...</div>
        </div>

        <div class="loading">
            <div class="spinner"></div>
        </div>

        <div class="error" id="error"></div>

        <div class="success-message" style="display: none;" id="successMessage">
            ✅ Enjoy Playing!
        </div>

        <a href="/" class="button">Back to QR Code</a>
    </div>

    <script>
        // ⚠️ IMPORTANT: Change this to your ngrok URL when using mobile
        // Example: 'https://157e70598100.ngrok-free.app'
        const BASE_URL = 'https://dynamic-movie-429498537564.europe-west1.run.app'; 
        
        const API_URL = BASE_URL;

        // Automatically get a movie when page loads
        window.addEventListener('DOMContentLoaded', function() {
            getMovie();
        });

        async function getMovie() {
            const movieNameEl = document.getElementById('movieName');
            const errorEl = document.getElementById('error');
            const loadingEl = document.querySelector('.loading');
            const successEl = document.getElementById('successMessage');

            // Show loading
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/api/movie`);
                const data = await response.json();

                if (response.ok) {
                    movieNameEl.innerHTML = `<div class="movie-name">${data.movie}</div>`;
                    successEl.style.display = 'block';
                    
                    // Add confetti effect
                    setTimeout(() => {
                        createConfetti();
                    }, 300);
                } else {
                    throw new Error(data.message || 'Failed to fetch movie');
                }
            } catch (error) {
                errorEl.textContent = '❌ ' + error.message;
                errorEl.style.display = 'block';
                movieNameEl.innerHTML = '<div class="placeholder">Error loading movie</div>';
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        function createConfetti() {
            const container = document.querySelector('.movie-display');
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f7d794', '#f8a5c2'];
            
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.position = 'fixed';
                    confetti.style.width = '10px';
                    confetti.style.height = '10px';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.opacity = '1';
                    confetti.style.borderRadius = '50%';
                    confetti.style.pointerEvents = 'none';
                    confetti.style.zIndex = '1000';
                    confetti.style.transition = 'all 2s ease-out';
                    
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => {
                        confetti.style.top = '100vh';
                        confetti.style.opacity = '0';
                        confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    }, 50);
                    
                    setTimeout(() => {
                        confetti.remove();
                    }, 2000);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
