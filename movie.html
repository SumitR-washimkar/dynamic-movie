<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Random Movie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #0a0a1a;
            overflow: hidden;
        }

        /* Animated gradient background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(22, 222, 212, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            animation: bgShift 8s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(22, 222, 212, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            animation: cardEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes cardEntry {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, rgba(22, 222, 212, 0.2), rgba(12, 131, 131, 0.2));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(22, 222, 212, 0.2);
        }

        .logo {
            width: 48px;
            height: 48px;
            display: block;
            filter: drop-shadow(0 0 8px rgba(22, 222, 212, 0.3));
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            font-size: 1.1em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .movie-display {
            position: relative;
            border-radius: 20px;
            padding: 48px 28px;
            margin: 24px 0 28px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(22, 222, 212, 0.15), rgba(12, 131, 131, 0.1));
            border: 1px solid rgba(22, 222, 212, 0.15);
        }

        .movie-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(22, 222, 212, 0.5), transparent);
        }

        .movie-display::after {
            content: '';
            background-image: url('logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 120px;
            height: 120px;
            position: absolute;
            opacity: 0.04;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .movie-name {
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
            font-size: 2.2em;
            font-weight: 700;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 30px rgba(22, 222, 212, 0.3);
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .movie-name.revealed {
            animation: revealMovie 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes revealMovie {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
                filter: blur(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        .placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1em;
            font-weight: 400;
        }

        .loading {
            display: none;
            margin: 20px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #16DED4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #ff6b6b;
            margin: 15px 0;
            padding: 14px 20px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.2);
            border-radius: 14px;
            display: none;
            font-size: 0.9em;
        }

        .success-message {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 14px 20px;
            border-radius: 14px;
            margin: 0 0 24px;
            font-weight: 500;
            font-size: 0.9em;
        }

        .button {
            position: relative;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.7);
            padding: 14px 32px;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .button:hover {
            background: rgba(22, 222, 212, 0.1);
            border-color: rgba(22, 222, 212, 0.3);
            color: #16DED4;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(22, 222, 212, 0.15);
        }

        .button:active {
            transform: translateY(0);
        }

        .button svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            border-radius: 3px;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        /* Large desktop */
        @media (min-width: 768px) {
            .container {
                max-width: 520px;
                padding: 56px 48px;
            }

            .movie-name {
                font-size: 2.4em;
            }
        }

        /* Tablet */
        @media (max-width: 600px) {
            .container {
                padding: 36px 24px;
                border-radius: 24px;
            }

            h1 {
                font-size: 0.9em;
            }

            .movie-name {
                font-size: 1.7em;
            }

            .movie-display {
                padding: 36px 20px;
                min-height: 150px;
            }

            .button {
                width: 100%;
                justify-content: center;
                padding: 14px 24px;
            }
        }

        /* Small phones */
        @media (max-width: 400px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 28px 18px;
                border-radius: 20px;
            }

            .logo-wrapper {
                width: 56px;
                height: 56px;
                border-radius: 16px;
                margin-bottom: 16px;
            }

            .logo {
                width: 36px;
                height: 36px;
            }

            h1 {
                font-size: 0.8em;
                letter-spacing: 1.5px;
            }

            .movie-display {
                padding: 28px 16px;
                min-height: 120px;
                margin: 18px 0 22px;
                border-radius: 16px;
            }

            .movie-name {
                font-size: 1.4em;
            }

            .placeholder {
                font-size: 0.95em;
            }

            .error {
                font-size: 0.8em;
                padding: 12px 16px;
                border-radius: 12px;
            }

            .success-message {
                font-size: 0.8em;
                padding: 12px 16px;
                border-radius: 12px;
                margin-bottom: 18px;
            }

            .button {
                font-size: 0.82em;
                padding: 12px 20px;
                border-radius: 12px;
            }
        }

        /* Very small screens */
        @media (max-width: 340px) {
            .container {
                padding: 22px 14px;
            }

            .movie-name {
                font-size: 1.2em;
            }

            .movie-display {
                padding: 24px 12px;
                min-height: 100px;
            }
        }

        /* Landscape phones */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                align-items: flex-start;
                padding: 12px;
            }

            .container {
                padding: 24px 28px;
                max-width: 500px;
            }

            .logo-wrapper {
                width: 48px;
                height: 48px;
                margin-bottom: 12px;
            }

            .logo {
                width: 32px;
                height: 32px;
            }

            .movie-display {
                padding: 24px 16px;
                min-height: 100px;
                margin: 14px 0 18px;
            }

            .movie-name {
                font-size: 1.5em;
            }

            .success-message {
                margin-bottom: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="logo-wrapper">
            <img src="logo.png" alt="Logo" class="logo">
        </div>
        <h1>Your Movie Is</h1>

        <div class="movie-display">
            <div id="movieName" class="placeholder">Loading your movie...</div>
        </div>

        <div class="loading">
            <div class="spinner"></div>
        </div>

        <div class="error" id="error"></div>

        <div class="success-message" id="successMessage">
            Enjoy Playing!
        </div>

        <a href="/" class="button">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back to QR Code
        </a>
    </div>

    <script>
        const BASE_URL = 'https://dynamic-movie-429498537564.europe-west1.run.app';
        const API_URL = BASE_URL;

        // Create floating particles
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                p.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(p);
            }
        })();

        // Automatically get a movie when page loads
        window.addEventListener('DOMContentLoaded', function() {
            getMovie();
        });

        async function getMovie() {
            const movieNameEl = document.getElementById('movieName');
            const errorEl = document.getElementById('error');
            const loadingEl = document.querySelector('.loading');
            const successEl = document.getElementById('successMessage');

            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/api/movie`);
                const data = await response.json();

                if (response.ok) {
                    movieNameEl.className = 'movie-name revealed';
                    movieNameEl.textContent = data.movie;
                    successEl.style.display = 'block';

                    setTimeout(() => createConfetti(), 400);
                } else {
                    throw new Error(data.message || 'Failed to fetch movie');
                }
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                movieNameEl.innerHTML = '<span class="placeholder">Error loading movie</span>';
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        function createConfetti() {
            const colors = ['#16DED4', '#6366f1', '#f59e0b', '#ec4899', '#10b981', '#f43f5e'];

            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    const size = Math.random() * 8 + 4;
                    piece.style.width = size + 'px';
                    piece.style.height = size * (Math.random() * 1.5 + 0.5) + 'px';
                    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.left = Math.random() * 100 + '%';
                    piece.style.top = '-10px';
                    piece.style.animation = `confettiFall ${Math.random() * 2 + 2}s linear forwards`;

                    document.body.appendChild(piece);

                    setTimeout(() => piece.remove(), 4000);
                }, i * 40);
            }
        }
    </script>
</body>
</html>
